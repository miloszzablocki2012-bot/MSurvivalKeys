name: MSurvivalKeys
version: 3.1
main: pl.msurvival.keys.MSurvivalKeys
api-version: '1.21'
author: Milekz

commands:
  menu:
    description: Otwiera menu serwera
    usage: /menu
  menuitem:
    description: Daje item menu
    usage: /menuitem
  weeklykey:
    description: Odbiera cotygodniowy klucz
    usage: /weeklykey
    aliases: [klucz, weekly]
  key:
    description: Używa klucza
    usage: /key use <typ>
  keyadmin:
    description: Administracja kluczami
    usage: /keyadmin <give|reset|reload|item> <gracz> [typ] [ilość]

permissions:
  msurvivalkeys.admin:
    description: Dostęp do administracji kluczami
    default: op
